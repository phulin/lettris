<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="block" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b87fff"/>
      <stop offset="45%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#4f1aad"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="100" height="100" rx="18" fill="#0e0618"/>
  <!-- L-tetromino: col 0 rows 0-2, col 1 row 2 -->
  <!-- Block size 28, gap 4, left=20, top=4 -->

  <!-- col0 row0 -->
  <rect x="20" y="4" width="28" height="28" rx="5" fill="url(#block)"/>
  <rect x="20" y="4" width="28" height="14" rx="5" fill="url(#shine)"/>
  <!-- col0 row1 -->
  <rect x="20" y="36" width="28" height="28" rx="5" fill="url(#block)"/>
  <rect x="20" y="36" width="28" height="14" rx="5" fill="url(#shine)"/>
  <!-- col0 row2 -->
  <rect x="20" y="68" width="28" height="28" rx="5" fill="url(#block)"/>
  <rect x="20" y="68" width="28" height="14" rx="5" fill="url(#shine)"/>
  <!-- col1 row2 -->
  <rect x="52" y="68" width="28" height="28" rx="5" fill="url(#block)"/>
  <rect x="52" y="68" width="28" height="14" rx="5" fill="url(#shine)"/>
</svg>
